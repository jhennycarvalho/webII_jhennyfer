<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Usuários</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
        }

        .login-container{
            background-color: white;
            padding: 40px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .login-container h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group{
            margin-bottom: 20px;
        }

        .input-group label{
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus{
            border-color: #4e73df;
        }

        .btn-login{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #4e73df;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover{
            background-color: #2e59d9;
        }

        .footer{
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .footer a{
            color: #4e73df;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Login</h1>

        <form action="{% url 'login' %}" method="post">
            {% csrf_token %}

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Digite seu email">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-login">
                Entrar
            </button>

            <div class="footer">
                <p>Não possui conta? <a href="#">Cadastre-se</a></p>
            </div>
        </form>
    </div>

</body>
</html>
