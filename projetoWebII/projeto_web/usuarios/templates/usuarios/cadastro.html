<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #36b9cc, #1cc88a);
        }

        .cadastro-container{
            background-color: white;
            padding: 40px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .cadastro-container h1{
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .input-group{
            margin-bottom: 18px;
        }

        .input-group label{
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .input-group input{
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
        }

        .input-group input:focus{
            border-color: #36b9cc;
        }

        .btn-cadastro{
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #36b9cc;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-cadastro:hover{
            background-color: #2c9faf;
        }

        .footer{
            margin-top: 15px;
            text-align: center;
        }

        .footer a{
            text-decoration: none;
            color: #36b9cc;
        }
    </style>
</head>
<body>

    <div class="cadastro-container">
        <h1>Cadastro</h1>

         <form action="{% url 'cadastro' %}" method="post">
            {% csrf_token %}

            <div class="input-group">
                <label>Nome</label>
                <input type="text" name="nome" placeholder="Digite seu nome">
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Digite seu email">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password" name="senha" placeholder="Digite sua senha">
            </div>

            <div class="input-group">
                <label>Confirmar senha</label>
                <input type="password" name="confirmar_senha" placeholder="Confirme sua senha">
            </div>

            <button type="submit" class="btn-cadastro">
                Cadastrar
            </button>

            <div class="footer">
                <p>Já possui conta? <a href="/">Fazer login</a></p>
            </div>

        </form>
    </div>

</body>
</html>
